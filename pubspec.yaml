name: prayer_walk
description: PrayerWalk — community prayer walking app for Nottingham and beyond.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Supabase — auth, database, realtime
  supabase_flutter: ^2.3.4
  # Maps
  mapbox_maps_flutter: ^2.23.0
  # GPS
  geolocator: ^12.0.0
  # State management
  provider: ^6.1.2
  # Env vars
  flutter_dotenv: ^5.1.0
  # Permissions UI
  permission_handler: ^11.3.1
  # Connectivity for feed / offline awareness
  connectivity_plus: ^6.0.3
  # Premium typography
  google_fonts: ^6.1.0
  # Smooth animations
  flutter_animate: ^4.5.0
  # Relative timestamps (e.g. "2 hours ago")
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
