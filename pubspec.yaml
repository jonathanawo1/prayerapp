name: prayer_walk
description: Prayer Walk Tracker — cover every road in prayer, together.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Supabase — auth, database, realtime
  supabase_flutter: ^2.3.4
  # Maps
  google_maps_flutter: ^2.6.1
  # GPS
  geolocator: ^12.0.0
  # State management
  provider: ^6.1.2
  # Env vars
  flutter_dotenv: ^5.1.0
  # Permissions UI
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
